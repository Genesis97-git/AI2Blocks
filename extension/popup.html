<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI2Blocks</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <main class="app">

    <header class="app-header">
      <img
        class="app-logo"
        src="icons/logo.svg"
        alt=""
        aria-hidden="true"
      >

      <div class="app-heading">
        <h1>AI2Blocks</h1>
        <p>AI-assisted development for MIT App Inventor</p>
      </div>
    </header>

    <label for="input">AI2Blocks Code</label>

    <textarea
      id="input"
      spellcheck="false"
      placeholder='Example:

when Button1.Click
set Label1.Text to "Hello!"'
    ></textarea>

    <div class="button-row">
      <button id="generate" class="primary" type="button">
        Generate Blocks
      </button>

      <button
        id="inspect"
        class="icon-button"
        type="button"
        title="Inspect selected block"
        aria-label="Inspect selected block"
      >
        <img
          class="button-icon"
          src="icons/inspect.svg"
          alt=""
          aria-hidden="true"
        >
      </button>
    </div>

    <div id="status" aria-live="polite"></div>

    <details>
      <summary>Advanced Tools</summary>

      <div class="advanced-content">
        <label for="fileInput">Load AI2Blocks or XML file</label>

        <input
          id="fileInput"
          type="file"
          accept=".ai2,.xml,.txt"
        >
      </div>
    </details>

  </main>

  <script src="js/ast.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/xmlGenerator.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
